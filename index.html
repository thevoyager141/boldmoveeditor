<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BOLD MOVE Pagination Editor</title><link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#dcdad4;color:#1d1b19;-webkit-font-smoothing:antialiased}
.toolbar{position:sticky;top:0;z-index:60;background:#1d1b19;color:#fff;display:flex;align-items:center;gap:8px;padding:10px 16px;flex-wrap:wrap}
.toolbar .t{font-weight:800;font-size:14px;margin-right:auto;letter-spacing:-.2px}
.toolbar button,.toolbar label.fbtn{background:#33302c;color:#fff;border:1px solid #4a463f;border-radius:7px;padding:7px 12px;font-size:12.5px;cursor:pointer;font-weight:600}
.toolbar button:hover{background:#4a463f}
.toolbar .prim{background:#d81f3a;border-color:#d81f3a}
.toolbar button.on{background:#2f9e8f;border-color:#2f9e8f}
#canvas{max-width:1160px;margin:18px auto 120px;padding:0 16px}
.spread-block{margin-bottom:30px}
.spread-head{display:flex;align-items:center;gap:6px;margin:0 0 8px}
.spread-head .sn{font-size:11px;font-weight:700;letter-spacing:.5px;color:#6f6a63}
.spread-head .sp{margin-left:auto;display:flex;gap:5px}
.spread-head button{background:#fff;border:1px solid #cfcabf;border-radius:6px;padding:4px 9px;font-size:11.5px;cursor:pointer}
.spread-head button:hover{background:#f2f0ea}
.spread-holder{position:relative;width:100%;overflow:hidden}
.spread{position:absolute;top:0;left:0;width:1024px;height:704px;background:#fbfaf7;box-shadow:0 10px 30px rgba(0,0,0,.16);transform-origin:top left}
.spread .fold{position:absolute;left:512px;top:0;bottom:0;width:1px;background:rgba(0,0,0,.16);z-index:1;pointer-events:none}
.spread.gridon{background-image:linear-gradient(rgba(0,0,0,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.05) 1px,transparent 1px);background-size:64px 64px}
.spread .folio{position:absolute;bottom:14px;font-size:10px;color:#c0bbb2;letter-spacing:.5px;z-index:1}
.spread .folio.l{left:30px}.spread .folio.r{right:30px}
.guide{position:absolute;background:#d81f3a;z-index:20;pointer-events:none}
.guide.v{top:0;bottom:0;width:1px}.guide.h{left:0;right:0;height:1px}
.block{position:absolute}
.block .ce{outline:none;width:100%}
.block.sel{outline:2px solid #d81f3a;z-index:5}
body.editing .block:hover{outline:1.5px solid rgba(216,31,58,.4)}
.b-label .ce{font-size:11px;letter-spacing:2px;color:#d81f3a;font-weight:700;text-transform:uppercase}
.b-heading .ce{font-size:26px;font-weight:800;letter-spacing:-.5px;line-height:1.3}
.b-subhead .ce{font-size:13px;font-style:italic;color:#6f6a63}
.b-body .ce{font-size:12px;line-height:1.9;color:#332f2b;text-align:justify}
.b-quote .ce{font-size:20px;font-weight:800;line-height:1.4;letter-spacing:-.3px;border-top:2px solid #1d1b19;padding-top:12px}
.b-image{overflow:hidden;border-radius:2px}
.b-image img{width:100%;height:100%;object-fit:cover;display:block}
.gal{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:1fr;gap:4px;width:100%;height:100%}
.gal .gcell{position:relative}
.gal .gcell:nth-child(1){grid-column:span 2;grid-row:span 2}
.gal .gcell:nth-child(4){grid-column:span 2}
.gal .gcell:nth-child(6){grid-column:span 2}
.gal .gcell img{width:100%;height:100%;object-fit:cover;border-radius:1px;display:block}
.gcell .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:4px;width:18px;height:18px;font-size:11px;cursor:pointer;display:none}
.gadd{border:1px dashed #c3beb2;background:#faf9f6;font-size:18px;color:#a8a293;cursor:pointer;border-radius:2px}
.chips{display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start}
.chip{position:relative;background:#fff;border:1px solid #e4e1da;border-radius:8px;padding:8px 11px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.chip .cq{font-size:12.5px;font-weight:700;line-height:1.4;letter-spacing:-.2px;outline:none}
.chip .cn{font-size:10px;color:#6f6a63;margin-top:3px;outline:none}
.chip.red{background:#d81f3a;border-color:#d81f3a}.chip.red .cq{color:#fff}.chip.red .cn{color:#ffd2d8}
.chip.mint{background:#e3efec;border-color:#cfe6e1}
.chip .rm,.chip .stl{position:absolute;top:-8px;border:none;border-radius:5px;width:18px;height:18px;font-size:11px;cursor:pointer;display:none}
.chip .rm{right:-8px;background:#1d1b19;color:#fff}.chip .stl{right:14px;background:#eee}
.qadd{border:1px dashed #c3beb2;background:#faf9f6;border-radius:7px;padding:4px 10px;font-size:11px;color:#7a756b;cursor:pointer;align-self:flex-start}
.mv{position:absolute;top:-10px;left:-10px;width:20px;height:20px;border-radius:50%;background:#1d1b19;color:#fff;font-size:11px;display:none;align-items:center;justify-content:center;cursor:move;z-index:9}
.rs{position:absolute;right:-7px;bottom:-7px;width:14px;height:14px;background:#d81f3a;border:2px solid #fff;border-radius:3px;cursor:nwse-resize;display:none;z-index:9}
.ctls{position:absolute;top:-12px;right:-6px;display:none;gap:3px;z-index:10;background:#fff;border:1px solid #e0dccf;border-radius:7px;padding:3px;box-shadow:0 3px 10px rgba(0,0,0,.14)}
.ctls .ctl{border:none;background:#f3f1ec;border-radius:5px;width:24px;height:22px;font-size:12px;cursor:pointer;line-height:1}
.ctls .ctl:hover{background:#e2ded5}
.ctls select{border:1px solid #e0dccf;border-radius:5px;font-size:11px}
body.editing .block:hover .mv,body.editing .block:hover .rs,body.editing .block:hover .ctls,body.editing .block:hover .gcell .rm,body.editing .block:hover .chip .rm,body.editing .block:hover .chip .stl,.block.sel .mv,.block.sel .rs,.block.sel .ctls{display:flex}
.gadd,.qadd{display:none}
body.editing .gadd,body.editing .qadd{display:block}
body:not(.editing) .spread-head{display:none}
#trash{position:fixed;right:24px;bottom:24px;width:96px;height:96px;border-radius:14px;background:#33302c;color:#fff;display:none;flex-direction:column;align-items:center;justify-content:center;font-size:24px;z-index:70;border:2px dashed #6f6a63;box-shadow:0 8px 24px rgba(0,0,0,.25)}
#trash div{font-size:9px;margin-top:4px;color:#c9c6bf}
body.editing #trash{display:flex}
#trash.hot{background:#d81f3a;border-color:#fff;transform:scale(1.08)}
.menu{position:fixed;z-index:200;background:#fff;border:1px solid #ddd8cf;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:6px;display:flex;flex-direction:column;gap:2px;min-width:120px}
.menu button{background:none;border:none;text-align:left;padding:7px 10px;font-size:12.5px;border-radius:5px;cursor:pointer}
.menu button:hover{background:#f2f0ea}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.picker{background:#fff;border-radius:12px;max-width:760px;width:100%;max-height:84vh;overflow:auto;padding:18px}
.picker-h{font-weight:800;font-size:15px;margin-bottom:12px}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.pth{cursor:pointer;border:1px solid #eee;border-radius:8px;overflow:hidden}
.pth:hover{outline:2px solid #d81f3a}
.pth img{width:100%;height:88px;object-fit:cover;display:block}
.pth .pcap{font-size:10px;color:#6f6a63;padding:3px 6px}
.uploadbtn{display:inline-block;margin-top:14px;background:#1d1b19;color:#fff;border-radius:8px;padding:9px 14px;font-size:12.5px;cursor:pointer;font-weight:600}
.pclose{margin-top:14px;margin-left:8px;background:#f3f1ec;border:1px solid #e4e1da;border-radius:8px;padding:9px 14px;font-size:12.5px;cursor:pointer}
.spread-head .grip{cursor:grab;color:#8a8578;font-size:11px;font-weight:700;padding:3px 7px;border:1px solid #cfcabf;border-radius:6px;background:#fff;user-select:none}
.spread-head .grip:active{cursor:grabbing}
.grip.dragging{opacity:.4}
.spread-block.drop-before{box-shadow:0 -3px 0 #d81f3a}
.spread-block.drop-after{box-shadow:0 3px 0 #d81f3a}
.sidebar{display:none;position:fixed;top:50px;right:0;bottom:0;width:250px;background:#fff;border-left:1px solid #e0dccf;padding:16px 16px 40px;overflow:auto;z-index:55}
body.editing .sidebar{display:block}
body.editing #canvas{max-width:none;margin:18px 266px 120px 10px}
.sb-title{font-weight:800;font-size:13px;margin-bottom:4px}
.sb-hint{font-size:12px;color:#8a8578;line-height:1.6}
.sb-lab{font-size:10.5px;font-weight:700;color:#8a8578;letter-spacing:.4px;margin:14px 0 5px}
.sb-sel{width:100%;padding:7px 8px;border:1px solid #d8d3c8;border-radius:7px;font-size:12.5px;background:#fff}
.sb-seg{display:flex;gap:4px}
.sb-seg button{flex:1;border:1px solid #d8d3c8;background:#f7f5f0;border-radius:6px;padding:7px 2px;font-size:11px;cursor:pointer}
.sb-seg button.on{background:#1d1b19;color:#fff;border-color:#1d1b19}
.sb-row{display:flex;align-items:center;gap:8px}
.sb-row button{width:36px;height:32px;border:1px solid #d8d3c8;background:#f7f5f0;border-radius:6px;font-size:16px;cursor:pointer}
.sb-fsv{font-size:12.5px;font-weight:700;min-width:46px;text-align:center}
.sb-wide{display:block;width:100%;text-align:left;border:1px solid #d8d3c8;background:#f7f5f0;border-radius:7px;padding:9px 11px;font-size:12.5px;cursor:pointer;margin-top:6px}
.sb-wide:hover{background:#eeece5}
.sb-wide.danger{color:#d81f3a;border-color:#f0c9cf;background:#fdf3f4}
@media print{.toolbar,#trash,.sidebar{display:none}#canvas,body.editing #canvas{margin:0;max-width:none;padding:0}.spread-head{display:none}.spread-block{margin:0}.spread-holder{overflow:visible;page-break-after:always}}

let state={"title": "BOLD MOVE Pagination Editor", "spreads": [{"blocks": [{"type": "image", "x": 512, "y": 0, "w": 512, "h": 704, "imgId": 13}, {"type": "label", "x": 64, "y": 72, "w": 410, "h": 40, "text": "PART 4 · COMMUNITY"}, {"type": "heading", "x": 64, "y": 116, "w": 430, "h": 120, "text": "함께,<br>접근성을 만들다", "fs": 1.55}, {"type": "subhead", "x": 64, "y": 244, "w": 430, "h": 40, "text": "Making Access, Together"}, {"type": "body", "x": 64, "y": 304, "w": 410, "h": 240, "text": "볼드무브는 LG전자와 무의가 함께 만든 접근성 커뮤니티다. 제품 체험단을 넘어, 일상의 불편을 같이 발견하고 대안까지 만들어보는 자리로 시작했다.<br><br>2기의 넉 달 동안 장애 당사자와 비장애인, 시니어, LG 임직원 마흔일곱 명이 일곱 개 조로 나뉘어 서로의 하루를 나눴다. 이 파트는 그 넉 달의 기록이자, 관계가 넓어질 때 접근성이 어떻게 커뮤니티가 되는지에 대한 이야기다."}, {"type": "label", "x": 64, "y": 596, "w": 410, "h": 40, "text": "47명 · 7개 조 · 4개월 · 4번의 개더링"}]}, {"blocks": [{"type": "image", "x": 0, "y": 0, "w": 1024, "h": 340, "imgId": 0}, {"type": "label", "x": 44, "y": 372, "w": 420, "h": 40, "text": "PART 4 — COMMUNITY"}, {"type": "heading", "x": 44, "y": 402, "w": 432, "h": 96, "text": "여럿이 모여,<br>더 넓어진 볼드무브"}, {"type": "subhead", "x": 44, "y": 500, "w": 432, "h": 40, "text": "Bolder, Together"}, {"type": "body", "x": 44, "y": 540, "w": 432, "h": 150, "text": "볼드무브는 LG전자와 무의(無意)가 함께 만든 접근성 커뮤니티다. 제품 체험단을 넘어, 일상의 불편을 같이 발견하고 대안까지 만들어보는 자리로 시작됐다.<br><br>1기는 장애 당사자들과 ‘관점의 전환’을 이야기했다. 그 기록을 담은 창간호는 접근성 매거진이라는 시도로 주목받으며 디자인 전문지를 비롯한 여러 매체에 소개됐다."}, {"type": "label", "x": 560, "y": 372, "w": 420, "h": 40, "text": "BOLD MOVE — SEASON 2"}, {"type": "heading", "x": 560, "y": 402, "w": 432, "h": 96, "text": "접근성은 어떻게<br>커뮤니티가 될 수 있을까?"}, {"type": "subhead", "x": 560, "y": 500, "w": 432, "h": 40, "text": "How access becomes community"}, {"type": "body", "x": 560, "y": 540, "w": 432, "h": 150, "text": "2기의 가장 큰 변화는 <b>함께하는 사람의 폭</b>이다. 장애 당사자와 비장애인, 시니어, LG 임직원까지 — 마흔일곱 명이 넉 달 동안 일곱 개 조로 나뉘어 서로의 하루를 나눴다.<br><br>이번 기록은 ‘무엇을 배려할까’가 아니라 ‘무엇을 같이 만들까’를 묻는다. 관계가 넓어질 때, 접근성은 비로소 커뮤니티가 된다."}]}, {"blocks": [{"type": "label", "x": 64, "y": 56, "w": 520, "h": 40, "text": "HOW IT WORKED · 지난 시즌과 무엇이 달라졌나"}, {"type": "heading", "x": 64, "y": 96, "w": 520, "h": 90, "text": "탐구에서 행동까지,<br>넉 달의 흐름"}, {"type": "image", "x": 608, "y": 56, "w": 352, "h": 208, "imgId": 7}, {"type": "body", "x": 64, "y": 296, "w": 896, "h": 380, "text": "볼드 무브의 두 번째 시즌은 지난 시즌과 세 가지가 달라졌다. 첫째는 함께한 사람들의 구성이다. 1기가 장애 당사자를 중심으로 ‘나다움’을 이야기했다면, 2기는 장애 당사자와 비장애인, 시니어, LG 임직원까지 마흔일곱 명이 일곱 개 조로 섞였다. 서로 다른 몸과 나이가 한 테이블에 앉았다.<br><br>둘째는 활동의 방향이다. 지난 시즌이 개인의 일상을 관찰하는 데 가까웠다면, 이번에는 관찰에서 멈추지 않고 직접 대안을 설계했다. ‘무엇을 배려할까’가 아니라 ‘무엇을 같이 만들까’가 넉 달을 관통한 질문이었다.<br><br>셋째는 결과물이다. 네 번의 개더링은 자기소개에서 시작해, 페르소나와 페인 포인트를 좁히고, 컨셉 보드를 거쳐, 실제 제품 발표와 시상까지 이어졌다. 발대식에서 낯설게 첫인사를 나눈 사람들이, 마지막 날에는 손에 잡히는 물건을 발표하고 서로를 응원했다. 아이디어가 물건이 되어 가는 과정 전체가 이번 시즌의 이야기다.", "cols": 2}]}, {"blocks": [{"type": "label", "x": 44, "y": 50, "w": 432, "h": 40, "text": "7 TEAMS · 일곱 가지 접근"}, {"type": "heading", "x": 44, "y": 110, "w": 220, "h": 220, "text": "세대와 경계를<br>섞은<br>일곱 팀"}, {"type": "image", "x": 281, "y": 96, "w": 225, "h": 250, "imgId": "u0"}, {"type": "image", "x": 518, "y": 96, "w": 225, "h": 250, "imgId": "u1"}, {"type": "image", "x": 755, "y": 96, "w": 225, "h": 250, "imgId": "u2"}, {"type": "image", "x": 44, "y": 358, "w": 225, "h": 250, "imgId": "u3"}, {"type": "image", "x": 281, "y": 358, "w": 225, "h": 250, "imgId": "u4"}, {"type": "image", "x": 518, "y": 358, "w": 225, "h": 250, "imgId": "u5"}, {"type": "image", "x": 755, "y": 358, "w": 225, "h": 250, "imgId": "u6"}]}, {"blocks": [{"type": "image", "x": 0, "y": 0, "w": 512, "h": 704, "imgId": 6}, {"type": "label", "x": 560, "y": 52, "w": 432, "h": 40, "text": "2ND GATHERING · 커넥트홀 · 26.05.30"}, {"type": "heading", "x": 560, "y": 92, "w": 432, "h": 96, "text": "3년을 기다린 리모컨,<br>그리고 ‘과정’이라는 말"}, {"type": "body", "x": 560, "y": 206, "w": 432, "h": 336, "text": "두 번째 개더링은 트윈타워 동관과 서관을 잇는 커넥트홀에서 열렸다. 박세라 리더는 이날 공용 리모컨 하나를 꺼냈다. 시각장애 당사자가 에어컨을 쓰기 어렵다는 이유로 국가인권위원회 진정을 세 번 받았고, 기획부터 출시까지 3년이 걸린 제품이다. 버튼을 누를 때마다 메뉴를 읽어 주는 이 기능은 그해 7월에야 세상에 나왔다.<br><br>미션잇 김병수 대표의 강연이 이어졌다. 그는 ‘사용자를 고려하지 않은 것은 디자인이 아니다’라고 말했다. 설계자와 사용자 사이의 경험 격차를 줄이는 참여형 디자인, 모두가 필요하다고 말할 수 있는 니즈와 밸런스가 핵심이라고 했다.<br><br>조별 발표에는 ‘김무버’ ‘무지개씨’ 같은 구체적인 페르소나가 등장했다. 마음은 스물인데 몸은 일흔인 액티브 시니어, 자주 깜빡하는 기계치 어르신. 홍윤희 이사장은 김병수 대표의 말을 다시 짚었다."}, {"type": "quote", "x": 560, "y": 560, "w": 432, "h": 110, "text": "“접근성은 완성이 아니라 과정이에요.”"}]}, {"blocks": [{"type": "image", "x": 0, "y": 0, "w": 512, "h": 704, "imgId": 12}, {"type": "label", "x": 560, "y": 44, "w": 432, "h": 40, "text": "INTERVIEW · 시니어 · 양명윤"}, {"type": "heading", "x": 560, "y": 84, "w": 432, "h": 100, "text": "“접근성은 비용이 아니라,<br>모두의 편리예요”", "fs": 1.08}, {"type": "subhead", "x": 560, "y": 196, "w": 432, "h": 40, "text": "특수교사 30년 · 스스로를 ‘거간꾼’이라 부르는"}, {"type": "body", "x": 560, "y": 238, "w": 432, "h": 430, "text": "특수교육 교사로 30년. 그는 1회차 자기소개에서 스스로를 ‘거간꾼’이라 불렀다. 세대와 입장이 다른 이들 사이에 서서 양쪽을 잇는 사람이라는 뜻이다.<br><br><b>Q. 특수교사로 일하며 ‘잘했다’ 느낀 순간이 있으셨나요?</b><br>공 굴리는 걸 15분을 기다린 적이 있어요. 자기 힘으로 손가락을 펴서 공을 밀어 굴러가게 하는데, 세상에서 제일 행복한 표정을 봤어요. 그전까진 자기 힘으로 해본 적 없던 학생이었거든요. 기다림의 끝이 성취로 이어지는 거죠.<br><br><b>Q. 선생님께 시니어로서의 시간은 어떤 의미인가요?</b><br>저에게는 새로운 시작이에요. 세상이 너무 빨리 변해요. 밥솥 하나만 바꿔도 메뉴 하나 바꾸는 데 버튼을 서른 번 넘게 눌러야 하니. 제가 주변인이었다가 이제 당사자가 된 거예요.<br><br><b>Q. 세대와 입장이 다른 이들이 이어지려면요?</b><br>접근성은 비용이 아니라 편리함이에요. 엘리베이터도 설치 시위할 땐 비판하다가 생기면 다들 줄 서서 타잖아요. 접근성에 대한 관점 자체가 바뀌어야 해요. 그게 모두의 편리로 이어지는 길이거든요."}]}, {"blocks": [{"type": "label", "x": 44, "y": 52, "w": 432, "h": 40, "text": "3RD GATHERING · 26.06.20"}, {"type": "heading", "x": 44, "y": 92, "w": 432, "h": 96, "text": "투명 우산과<br>손에 잡힌 아이디어"}, {"type": "body", "x": 44, "y": 206, "w": 432, "h": 464, "text": "비 오는 날, 팔찌 색이 같은 사람끼리 모여 사진을 찍으면 투명한 볼드무브 우산을 받는 미션으로 세 번째 개더링이 시작됐다. 이날의 화두는 ‘규제’였다. 오브제컬렉션 얼음정수기의 온수 음성 출수는 안전 규제에 번번이 막혔고, 팀은 샌드박스라는 규제 개선 프로그램으로 우회로를 뚫는 중이었다.<br><br>컴포트 키트 담당 이지연은 체험존에서 관찰한 것을 디자인으로 되돌렸다. 세탁기 도어를 손등만으로 여는 이지핸들, 옷을 쉽게 거는 이지행어. 사람들이 실제로 손잡이처럼 잡아 여는 걸 보고 형태를 바꿨다. 아이디어가 처음으로 손에 잡히는 물건이 되던 순간이었다.<br><br>멘토 이경미 대표는 ‘디자인의 첫걸음은 공감이고, 여러분은 이미 공감에서 출발했다’고 말했다. 세라 리더는 한나 아렌트를 인용하며 하루를 닫았다."}, {"type": "gallery", "x": 556, "y": 52, "w": 436, "h": 432, "imgs": [3, 5, 11, 9]}, {"type": "quote", "x": 556, "y": 512, "w": 436, "h": 158, "text": "“진짜 해방은 스스로<br>무언가를 향해 가는 것.”"}]}, {"blocks": [{"type": "image", "x": 0, "y": 0, "w": 512, "h": 704, "imgId": 14}, {"type": "label", "x": 560, "y": 44, "w": 432, "h": 40, "text": "INTERVIEW · 배드민턴 선수 · 김홍이"}, {"type": "heading", "x": 560, "y": 84, "w": 432, "h": 100, "text": "“휠체어가 편하면,<br>모두가 편해요”", "fs": 1.12}, {"type": "subhead", "x": 560, "y": 196, "w": 432, "h": 40, "text": "강원도 대표 배드민턴 선수 · 인스타그래머"}, {"type": "body", "x": 560, "y": 238, "w": 432, "h": 430, "text": "강원도 대표 배드민턴 선수이자 팔로워 1만 명의 인스타그래머. 독립 1년 차인 그는 휠체어 사용자의 눈높이에서 일상을 기록한다.<br><br><b>Q. 어떤 계기로 배드민턴을 시작하셨나요?</b><br>입원했을 때 제일 많이 들은 말이 장애인은 운동이 필수라는 거였어요. 그런데도 집에 있는 시간이 길었죠. 안 되겠다 싶어 가장 접근하기 쉬운 배드민턴을 찾아갔어요. 시작했더니 뇌가 회전하는 느낌, 세상이 확장되는 느낌을 많이 받았어요. 올해 7년 차예요.<br><br><b>Q. 가전을 쓰면서 불편했던 순간은요?</b><br>높낮이가 제일 큰 문제예요. 서 있는 사람 높이로 가정하니까 타워세탁기는 손이 안 닿고, 세제함이 위에 있으면 보이지도 않아요. 어린아이 눈높이로 사는 건데 그게 고려가 안 돼요.<br><br><b>Q. 홍이 님이 느낀 접근성의 가치는요?</b><br>휠체어 타는 사람만 편하자는 게 아니에요. 유모차도, 노약자도 다 힘든 길이잖아요. 휠체어가 편하면 모두가 편할 수 있어요. 미래의 사람들은 제가 겪은 불편을 덜 겪었으면 좋겠어요."}]}, {"blocks": [{"type": "image", "x": 0, "y": 0, "w": 512, "h": 704, "imgId": 0}, {"type": "label", "x": 560, "y": 52, "w": 432, "h": 40, "text": "4TH GATHERING · 최종 발표 · 26.07.18"}, {"type": "heading", "x": 560, "y": 92, "w": 432, "h": 96, "text": "흐린 날, 오히려<br>채도가 높았던 자리"}, {"type": "body", "x": 560, "y": 206, "w": 432, "h": 336, "text": "간밤에 비가 많이 내려 흐린 날이었지만, 사람들의 에너지는 오히려 넘쳤다. 조와 상관없이 일상을 이야기하고 웃는 모습이 편안했다. 날은 흐린데 분위기의 채도는 더 높아진 느낌, Life’s Good이라는 슬로건이 매번 느껴지는 현장이었다.<br><br>일곱 개 조가 넉 달의 결과를 발표했다. 앉아서 씻는 올인원 비데시트, 사용자를 먼저 알아보는 정수기, 거실의 중심이 되는 반려가전, 사용자에게 다가오는 무빙 아일랜드, 위로 열리는 세탁기 문까지. 심사위원의 피드백이 오갔고, 박빙 끝에 최우수는 1조 무빙 아일랜드에게 돌아갔다.<br><br>한 심사위원은 이렇게 말했다. ‘해커톤 같은 행사와 달랐다. 경쟁보다 축제 같았다.’ 발표가 끝나고 사람들은 저마다 ‘나에게 볼드 무브란’ 한 줄을 남겼다."}, {"type": "quote", "x": 560, "y": 560, "w": 432, "h": 110, "text": "“경쟁보다, 축제 같았어요.”"}]}, {"blocks": [{"type": "image", "x": 0, "y": 0, "w": 512, "h": 704, "imgId": 10}, {"type": "label", "x": 560, "y": 44, "w": 432, "h": 40, "text": "INTERVIEW · 모델 · 김세진"}, {"type": "heading", "x": 560, "y": 84, "w": 432, "h": 100, "text": "“쌓으면 벽이 되지만,<br>펼치면 길이 돼요”", "fs": 1.1}, {"type": "subhead", "x": 560, "y": 196, "w": 432, "h": 40, "text": "패션 모델 · 접근성 스페셜리스트"}, {"type": "body", "x": 560, "y": 238, "w": 432, "h": 430, "text": "수영 선수에서 게임사 접근성 스페셜리스트로, 다시 패션 모델로. 그는 끊임없이 자신을 새롭게 정의해 왔다.<br><br><b>Q. 계속 도전을 시작하게 된 계기는요?</b><br>저한텐 모든 길이 점프였어요. 어렸을 땐 아무것도 못 한다는 얘기만 들었는데, 수영도 하고 해외에서 공부도 하고 게임회사도 갔죠. 연결되지 않던 삶인데 살다 보니 하나로 이어지더라고요. 쌓으면 벽이 되지만 펼치면 길이 된다, 그게 제 모토예요.<br><br><b>Q. 접근성 스페셜리스트로 일하며 배운 건요?</b><br>나도 내 장애만 이해했다는 거예요. 정말 접근성을 고려하려면 다양한 배경의 사람을 만나 뭐가 어려운지 직접 들어야 했어요. ‘특정 장애를 위한 제품’을 ‘모두를 위한 디자인’으로 넓혔으면 좋겠어요.<br><br><b>Q. 앞으로 도전하고 싶은 일은요?</b><br>접근성이 접근성으로 불리지 않았으면 해요. 당연한 게 되면 필요하다는 얘기도 안 하니까요. 지금은 패션에서 영향력을 갖고, 이후엔 저를 보며 꿈꾸는 분들에게 기회를 주고 싶어요."}]}, {"blocks": [{"type": "label", "x": 44, "y": 44, "w": 432, "h": 40, "text": "VOICES · 나에게 볼드 무브란"}, {"type": "heading", "x": 44, "y": 84, "w": 432, "h": 96, "text": "나에게,<br>볼드 무브란"}, {"type": "body", "x": 44, "y": 200, "w": 432, "h": 300, "text": "마지막 개더링, 발표가 끝난 자리에서 참가자들은 각자 ‘나에게 볼드 무브란’ 한 문장을 남겼다. 넉 달을 압축한 말들이다. 누군가는 관계를 얻었고, 누군가는 처음으로 자기 자신을 포용하는 법을 배웠다."}, {"type": "quotes", "x": 560, "y": 44, "w": 432, "h": 626, "items": [{"q": "“다른 사람을 포용하러 왔다가, 나를 포용하는 법을 배운 곳.”", "nm": "", "style": ""}, {"q": "“접근성이라는, 무관심의 영역에 발을 들이게 된 과정.”", "nm": "", "style": "mint"}, {"q": "“토요일 아침 6시에 일어나게 만든 곳.”", "nm": "", "style": ""}, {"q": "“함께 만드는 움직임.”", "nm": "", "style": "red"}, {"q": "“Life’s Good을 행동으로 옮기는 곳.”", "nm": "", "style": ""}, {"q": "“전혀 다른 사람들을 만나, 내 세계가 커지는 기회.”", "nm": "", "style": "mint"}, {"q": "“무슨 빛이든 무지개로 만드는 프리즘.”", "nm": "", "style": "red"}]}]}, {"blocks": [{"type": "label", "x": 44, "y": 56, "w": 432, "h": 40, "text": "MEMBER’S PROPOSAL · 참여가 만든 제품"}, {"type": "heading", "x": 44, "y": 96, "w": 432, "h": 100, "text": "한 참가자가<br>먼저 그린 미래"}, {"type": "body", "x": 44, "y": 208, "w": 432, "h": 420, "text": "‘세상의 속도를 따라가기보다 내 페이스대로.’ 중증 시각장애 당사자인 3조 김기동 씨가 첫 모임에서 자신을 소개한 말이다. 그는 워크숍이 끝난 뒤에도 아이디어를 멈추지 않았다.<br><br>체온계를 ThinQ에 연동해 수치를 음성으로 읽어 주는 방식, 여섯 개의 문을 나눠 필요한 칸만 여는 냉장고 구조를 직접 제안서로 정리해 보내왔다. 문서와 이미지까지 갖춘 완성도였다.<br><br>커뮤니티가 일회성 체험이 아니라 실제 제품 제안으로 이어진다는, 가장 분명한 증거다. ‘참여 전과 후가 달라진다’는 목표가 여기서 얼굴을 얻는다."}, {"type": "image", "x": 556, "y": 56, "w": 436, "h": 378, "imgId": 11}, {"type": "subhead", "x": 556, "y": 444, "w": 436, "h": 40, "text": "김기동 씨가 직접 정리해 보내온 제안서의 일부."}, {"type": "quote", "x": 556, "y": 504, "w": 436, "h": 150, "text": "“쓰는 사람이 가장 좋은 설계자예요.”"}]}, {"blocks": [{"type": "label", "x": 64, "y": 60, "w": 900, "h": 40, "text": "ESSAY · BOLD MOVE LIFE"}, {"type": "heading", "x": 64, "y": 100, "w": 900, "h": 70, "text": "누군가의 하루를 바꾸는 일", "fs": 1.12}, {"type": "body", "x": 64, "y": 206, "w": 896, "h": 430, "text": "접근성은 종종 배려의 언어로 이야기된다. 그러나 볼드무브의 넉 달을 지켜보며, 나는 그것이 배려가 아니라 설계의 문제라는 걸 다시 배웠다. 누군가를 위해 무언가를 ‘봐주는’ 것이 아니라, 처음부터 더 많은 사람이 들어올 수 있게 문을 넓게 다는 일이다.<br><br>일곱 개 조가 넉 달 동안 한 일도 결국 그것이었다. 리모컨의 버튼 하나, 세탁기 문이 열리는 방향, 냉장고 손잡이의 각도. 사소해 보이는 결정마다 누군가의 하루가 걸려 있었다.<br><br>가장 인상 깊었던 건 참가자들이 서로를 발견하는 방식이었다. 장애 당사자는 비장애인의 무심함을, 비장애인은 자신이 놓친 세계를, 시니어는 오래 살아낸 사람만의 감각을 꺼내 놓았다. 한 사람의 불편이 다른 사람의 아이디어가 되고, 그 아이디어가 또 다른 사람의 하루를 바꿨다.<br><br>관계가 넓어질수록 접근성의 범위도 넓어졌다. 처음엔 장애의 문제로 시작한 대화가 나이 듦으로, 돌봄으로, 결국 ‘함께 산다는 것’ 전체로 번졌다.<br><br>바꾸는 것은 거대한 무엇이 아니다. 한 사람의 하루, 그 작은 단위에서 시작된다. 볼드무브가 증명한 것은 그 하루가 혼자가 아니라 여럿의 손에서 바뀐다는 사실이다. 그리고 그렇게 바뀐 하루는, 다시 누군가의 내일이 된다.", "cols": 2}, {"type": "subhead", "x": 64, "y": 656, "w": 900, "h": 40, "text": "글 · 홍윤희 (무의 이사장)"}]}]};let editing=true;let gridOn=false;let autofit=false;

 c.appendChild(ctl('⤒','맨 앞으로',()=>{const i=sp.blocks.indexOf(b);sp.blocks.splice(i,1);sp.blocks.push(b);render();}));
 c.appendChild(ctl('🗑','삭제',()=>{const i=sp.blocks.indexOf(b);sp.blocks.splice(i,1);render();}));return c;}
function renderBlock(b,sp,spEl){const el=$('div','block b-'+b.type);el.style.left=b.x+'px';el.style.top=b.y+'px';el.style.width=b.w+'px';
 if(b.type==='image'||b.type==='gallery')el.style.height=b.h+'px';else el.style.minHeight=b.h+'px';
 if(b.type==='image'){const im=$('img');im.src=imgSrc(b.imgId);im.draggable=false;el.appendChild(im);el.addEventListener('dblclick',e=>{if(!editing)return;e.stopPropagation();openPicker(id=>{b.imgId=id;render();});});}
 else if(b.type==='gallery'){el.appendChild(galInner(b));}
 else if(b.type==='quotes'){el.appendChild(quotesInner(b));}
 else{el.style.display='flex';el.style.flexDirection='column';el.style.justifyContent=(b.valign==='middle'?'center':(b.valign==='bottom'?'flex-end':'flex-start'));const ed=$('div','ce');ed.contentEditable=editing?'true':'false';ed.innerHTML=b.text||'';ed.style.textAlign=b.align||'left';ed.style.fontSize=((BASE[b.type]||12)*(b.fs||1))+'px';if(b.cols>1){ed.style.columnCount=b.cols;ed.style.columnGap='22px';}ed.addEventListener('input',()=>b.text=ed.innerHTML);ed.addEventListener('focus',()=>selectBlock(b,sp,el));ed.addEventListener('pointerdown',()=>selectBlock(b,sp,el));el.appendChild(ed);}
 const mv=$('div','mv','✥');el.appendChild(mv);const rs=$('div','rs');el.appendChild(rs);
 mv.addEventListener('pointerdown',e=>{e.stopPropagation();selectBlock(b,sp,el);startMove(e,b,sp,el,spEl);});
 rs.addEventListener('pointerdown',e=>{e.stopPropagation();selectBlock(b,sp,el);startResize(e,b,sp,el,spEl);});
 el.addEventListener('pointerdown',e=>{if(!editing)return;if(e.target.closest('.ce,.cq,.cn,.rs,.mv,.rm,.stl,.gadd,.qadd')){if(e.target.closest('.cq,.cn'))selectBlock(b,sp,el);return;}selectBlock(b,sp,el);startMove(e,b,sp,el,spEl);});
 elMap.set(b,el);return el;}
function drawGuides(spEl,gx,gy){clearGuides(spEl);if(gx!=null){const v=$('div','guide v');v.style.left=gx+'px';spEl.appendChild(v);}if(gy!=null){const h=$('div','guide h');h.style.top=gy+'px';spEl.appendChild(h);}}
function clearGuides(spEl){spEl.querySelectorAll('.guide').forEach(g=>g.remove());}
function smartSnap(nx,ny,b,sp){const bx=[nx,nx+b.w/2,nx+b.w],by=[ny,ny+b.h/2,ny+b.h];const tx=[0,512,1024],ty=[0,352,704];sp.blocks.forEach(o=>{if(o===b)return;tx.push(o.x,o.x+o.w/2,o.x+o.w);ty.push(o.y,o.y+o.h/2,o.y+o.h);});
 let dx=null,gx=null;bx.forEach(v=>tx.forEach(t=>{const d=t-v;if(Math.abs(d)<TH&&(dx===null||Math.abs(d)<Math.abs(dx))){dx=d;gx=t;}}));
 let dy=null,gy=null;by.forEach(v=>ty.forEach(t=>{const d=t-v;if(Math.abs(d)<TH&&(dy===null||Math.abs(d)<Math.abs(dy))){dy=d;gy=t;}}));
 return {x:Math.round(dx!==null?nx+dx:nx),y:Math.round(dy!==null?ny+dy:ny),gx:dx!==null?gx:null,gy:dy!==null?gy:null};}
function startMove(e,b,sp,el,spEl){e.preventDefault();const s=parseFloat(spEl.dataset.s)||1;const sx=e.clientX,sy=e.clientY,ox=b.x,oy=b.y;const tr=document.getElementById('trash');let hot=false;
 function mv(ev){const rx=ox+(ev.clientX-sx)/s,ry=oy+(ev.clientY-sy)/s;
  if(gridOn){b.x=Math.round(rx/GRID)*GRID;b.y=Math.round(ry/GRID)*GRID;clearGuides(spEl);}
  else{const r=smartSnap(rx,ry,b,sp);b.x=r.x;b.y=r.y;drawGuides(spEl,r.gx,r.gy);}
  el.style.left=b.x+'px';el.style.top=b.y+'px';
  const R=tr.getBoundingClientRect();hot=ev.clientX>=R.left&&ev.clientX<=R.right&&ev.clientY>=R.top&&ev.clientY<=R.bottom;tr.classList.toggle('hot',hot);}
 function up(){document.removeEventListener('pointermove',mv);document.removeEventListener('pointerup',up);tr.classList.remove('hot');clearGuides(spEl);if(hot){const i=sp.blocks.indexOf(b);if(i>=0)sp.blocks.splice(i,1);render();}}
 document.addEventListener('pointermove',mv);document.addEventListener('pointerup',up);}
function startResize(e,b,sp,el,spEl){e.preventDefault();const s=parseFloat(spEl.dataset.s)||1;const sx=e.clientX,sy=e.clientY,ow=b.w,oh=b.h;
 function mv(ev){let nw=ow+(ev.clientX-sx)/s,nh=oh+(ev.clientY-sy)/s;if(gridOn){nw=Math.round(nw/GRID)*GRID;nh=Math.round(nh/GRID)*GRID;}b.w=Math.max(GRID,Math.round(nw));b.h=Math.max(GRID,Math.round(nh));el.style.width=b.w+'px';if(b.type==='image'||b.type==='gallery')el.style.height=b.h+'px';else el.style.minHeight=b.h+'px';}
 function up(){document.removeEventListener('pointermove',mv);document.removeEventListener('pointerup',up);if(autofit)triggerAF();}
 document.addEventListener('pointermove',mv);document.addEventListener('pointerup',up);}
const ADD=[['label','라벨',{w:360,h:40,text:'라벨'}],['heading','제목',{w:432,h:90,text:'제목'}],['subhead','부제',{w:432,h:40,text:'부제'}],['body','본문',{w:432,h:220,text:'본문 텍스트를 입력하세요.'}],['quote','인용',{w:432,h:120,text:'“인용 문장”'}],['image','이미지',{w:320,h:220,imgId:0}],['gallery','갤러리',{w:432,h:380,imgs:[1,2,4]}],['quotes','인용모음',{w:440,h:380,items:[{q:'“인용”',nm:'이름'}]}]];
function addBlock(sp,type){const d=ADD.find(a=>a[0]===type)[2];const b=Object.assign({type:type,x:80,y:80},JSON.parse(JSON.stringify(d)));sp.blocks.push(b);render();if(autofit)triggerAF();}
function openTypeMenu(sp,btn){closeMenus();const m=$('div','menu');ADD.forEach(([t,l])=>{const b=$('button',null,l);b.onclick=()=>{addBlock(sp,t);closeMenus();};m.appendChild(b);});document.body.appendChild(m);const r=btn.getBoundingClientRect();m.style.left=r.left+'px';m.style.top=(r.bottom+4)+'px';setTimeout(()=>document.addEventListener('pointerdown',od),0);function od(ev){if(!ev.target.closest('.menu')){closeMenus();document.removeEventListener('pointerdown',od);}}}
function closeMenus(){document.querySelectorAll('.menu').forEach(m=>m.remove());}
function spreadHead(sp,si){const h=$('div','spread-head');const grip=$('span','grip','⠿ 순서');grip.draggable=true;grip.title='드래그해서 스프레드 순서 바꾸기';grip.addEventListener('dragstart',e=>{dragSI=si;grip.classList.add('dragging');e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',String(si));}catch(_){}});grip.addEventListener('dragend',()=>{dragSI=null;grip.classList.remove('dragging');document.querySelectorAll('.spread-block').forEach(x=>x.classList.remove('drop-before','drop-after'));});h.appendChild(grip);h.appendChild($('span','sn','SPREAD '+(si+1)+'  ·  p'+(FOLIO0+si*2)+'–'+(FOLIO0+si*2+1)));const g=$('div','sp');const add=$('button',null,'＋ 블록');add.onclick=e=>{e.stopPropagation();openTypeMenu(sp,add);};g.appendChild(add);const dup=$('button',null,'⧉ 복제');dup.onclick=()=>{state.spreads.splice(si+1,0,JSON.parse(JSON.stringify(sp)));render();};g.appendChild(dup);const ns=$('button',null,'＋ 스프레드');ns.onclick=()=>{state.spreads.splice(si+1,0,{blocks:[]});render();};g.appendChild(ns);const del=$('button',null,'🗑');del.title='스프레드 삭제';del.onclick=()=>{if(confirm('이 스프레드를 삭제할까요?')){state.spreads.splice(si,1);render();}};g.appendChild(del);h.appendChild(g);return h;}
function render(){const _sc=(document.scrollingElement||document.documentElement).scrollTop;elMap=new Map();canvas.innerHTML='';state.spreads.forEach((sp,si)=>{const wrap=$('div','spread-block');wrap.dataset.si=si;wrap.addEventListener('dragover',e=>{if(dragSI==null)return;e.preventDefault();const r=wrap.getBoundingClientRect();const after=(e.clientY-r.top)>r.height/2;document.querySelectorAll('.spread-block').forEach(x=>x.classList.remove('drop-before','drop-after'));wrap.classList.add(after?'drop-after':'drop-before');});wrap.addEventListener('drop',e=>{if(dragSI==null)return;e.preventDefault();const r=wrap.getBoundingClientRect();const after=(e.clientY-r.top)>r.height/2;moveSpread(dragSI,si+(after?1:0));});wrap.appendChild(spreadHead(sp,si));const holder=$('div','spread-holder');const spEl=$('div','spread'+(gridOn?' gridon':''));spEl.dataset.si=si;const fold=$('div','fold');spEl.appendChild(fold);sp.blocks.forEach(b=>spEl.appendChild(renderBlock(b,sp,spEl)));spEl.appendChild($('div','folio l',(FOLIO0+si*2)));spEl.appendChild($('div','folio r',(FOLIO0+si*2+1)));holder.appendChild(spEl);wrap.appendChild(holder);canvas.appendChild(wrap);});fitSpreads();document.body.classList.toggle('editing',editing);if(selBlock){const el=elMap.get(selBlock);if(el)el.classList.add('sel');else{selBlock=null;selSp=null;}}buildSidebar();(document.scrollingElement||document.documentElement).scrollTop=_sc;}
function fitSpreads(){document.querySelectorAll('.spread-holder').forEach(h=>{const s=Math.min(1,h.clientWidth/SW);const sp=h.querySelector('.spread');sp.dataset.s=s;sp.style.transform='scale('+s+')';sp.style.left=Math.max(0,(h.clientWidth-SW*s)/2)+'px';h.style.height=(SH*s)+'px';});}
window.addEventListener('resize',fitSpreads);
function isL(b){return b.x+b.w<=520;}function isR(b){return b.x>=504;}
function colTop(sp,lo,hi){let top=40;sp.blocks.forEach(bb=>{const spanning=!isL(bb)&&!isR(bb);const overlaps=bb.x<hi&&(bb.x+bb.w)>lo;if(spanning&&overlaps&&bb.y<=44)top=Math.max(top,bb.y+bb.h+14);});return top;}
function measureH(b){const el=elMap.get(b);return el?el.offsetHeight:b.h;}
function eachCol(cb){state.spreads.forEach(sp=>{cb(sp,sp.blocks.filter(isL).slice().sort((a,b)=>a.y-b.y),0,512);cb(sp,sp.blocks.filter(isR).slice().sort((a,b)=>a.y-b.y),512,1024);});}
function autoFitAll(){
 eachCol((sp,cols,lo,hi)=>{const n=cols.length;if(!n)return;const top=colTop(sp,lo,hi),avail=SH-top-40,minGap=12;const hs=cols.map(measureH);const sum=hs.reduce((a,b)=>a+b,0);
  if(sum+minGap*(n-1)>avail){const ti=cols.map((b,i)=>TEXT.includes(b.type)?i:-1).filter(i=>i>=0);const textH=ti.reduce((s,i)=>s+hs[i],0),nonText=sum-textH,target=avail-nonText-minGap*(n-1);if(textH>0&&target>0){const sc=Math.max(0.5,Math.min(1,target/textH));ti.forEach(i=>{cols[i]._fs=Math.max(0.5,Math.min(1,(cols[i].fs||1)*sc));});}}
  else{cols.forEach(b=>{if(TEXT.includes(b.type)&&(b.fs||1)<1)b._fs=1;});}});
 let fc=false;state.spreads.forEach(sp=>sp.blocks.forEach(b=>{if(b._fs!==undefined){if(Math.abs(b._fs-(b.fs||1))>0.02){b.fs=b._fs;fc=true;}delete b._fs;}}));
 if(fc){render();requestAnimationFrame(positionColumns);}else positionColumns();}
function positionColumns(){
 eachCol((sp,cols,lo,hi)=>{const n=cols.length;if(!n)return;const top=colTop(sp,lo,hi),avail=SH-top-40,minGap=12;const hs=cols.map(measureH);const sum=hs.reduce((a,b)=>a+b,0);let gap=n>1?(avail-sum)/(n-1):0;if(gap<minGap)gap=minGap;let y=top;cols.forEach((b,i)=>{b.y=Math.round(y);const el=elMap.get(b);if(el)el.style.top=b.y+'px';y+=hs[i]+gap;});});}
function triggerAF(){if(autofit)autoFitAll();}
function openPicker(cb){const ov=$('div','overlay');const box=$('div','picker');box.appendChild($('div','picker-h','사진 선택 (또는 업로드)'));const grid=$('div','pgrid');LIBRARY.forEach((im,i)=>{const t=$('div','pth');const g=$('img');g.src=im.src;t.appendChild(g);t.appendChild($('div','pcap',im.name));t.onclick=()=>{cb(i);close();};grid.appendChild(t);});Object.keys(uploads).forEach(id=>{const t=$('div','pth');const g=$('img');g.src=uploads[id];t.appendChild(g);t.appendChild($('div','pcap','업로드'));t.onclick=()=>{cb(id);close();};grid.appendChild(t);});box.appendChild(grid);const up=$('label','uploadbtn','＋ 새 이미지 업로드');const fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.style.display='none';fi.onchange=()=>{const f=fi.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{const id='u'+(uc++);uploads[id]=r.result;cb(id);close();};r.readAsDataURL(f);};up.appendChild(fi);box.appendChild(up);const cl=$('button','pclose','닫기');cl.onclick=close;box.appendChild(cl);ov.appendChild(box);document.body.appendChild(ov);function close(){ov.remove();}ov.onclick=e=>{if(e.target===ov)close();};}
function exportJSON(){const blob=new Blob([JSON.stringify({state,uploads})],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='boldmove_pagination.json';a.click();}
function importJSON(f){const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);state=d.state||d;uploads=d.uploads||{};render();if(autofit)triggerAF();}catch(e){alert('불러오기 실패: '+e.message);}};r.readAsText(f);}
document.getElementById('tgl').onclick=()=>{editing=!editing;document.getElementById('tgl').textContent=editing?'👁 미리보기':'✎ 편집';render();};
document.getElementById('grd').onclick=function(){gridOn=!gridOn;this.classList.toggle('on',gridOn);render();};
document.getElementById('af').onclick=function(){autofit=!autofit;this.classList.toggle('on',autofit);if(autofit)triggerAF();};
document.getElementById('addsp').onclick=()=>{state.spreads.push({blocks:[]});render();};
document.getElementById('exp').onclick=exportJSON;
document.getElementById('imp').onchange=e=>{if(e.target.files[0])importJSON(e.target.files[0]);};
document.getElementById('prt').onclick=()=>window.print();
canvas.addEventListener('pointerdown',e=>{if(!editing)return;if(e.target.closest('.block')||e.target.closest('.spread-head'))return;selBlock=null;selSp=null;select(null);buildSidebar();});
render();
</script></body></html>
